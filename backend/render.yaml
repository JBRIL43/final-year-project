services:
  - type: web
    name: hu-student-debt-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node api/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database ───────────────────────────────────────────────────────────
      # REQUIRED: Set this in Render dashboard → Environment tab
      # Format: postgres://USER:PASSWORD@HOST:PORT/DATABASE?sslmode=require
      # Get this from your Supabase project → Settings → Database → Connection string (URI)
      - key: SUPABASE_DATABASE_URL
        sync: false

      # REQUIRED in production — long random value; used for POST /api/auth/sync-firebase-users
      - key: SYNC_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CLIENT_URL
        value: https://student-debt-admin.onrender.com

      # ── Chapa Payment Gateway (Test Keys) ─────────────────────────────────
      - key: CHAPA_SECRET_KEY
        value: CHASECK_TEST-Me9xqMfgtr6dCcVCDMqzrqK1JXHrRv6s
      - key: CHAPA_PUBLIC_KEY
        value: CHAPUBK_TEST-EP4Y8Ip5eOOGqQcB0UgJJvbWCrovB3oh
      - key: CHAPA_ENCRYPTION_KEY
        value: QVZb9CKnE9grnw1OjfeG4RGP

      # ── API base URL (used in Chapa callbacks) ─────────────────────────────
      - key: API_BASE_URL
        value: https://final-year-project-r2h8.onrender.com
